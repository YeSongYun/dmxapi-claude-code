name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 生成 Changelog
      - name: Generate Changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}

          # Windows AMD64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${VERSION}-windows-amd64.exe

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${VERSION}-linux-amd64

          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dmxapi-claude-code-${VERSION}-linux-arm64

          # macOS AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${VERSION}-macos-amd64

          # macOS ARM64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dmxapi-claude-code-${VERSION}-macos-arm64

      # 创建增强的 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DMXAPI Claude Code ${{ github.ref_name }}
          body: |
            ## DMXAPI Claude Code 配置工具 ${{ github.ref_name }}

            一键配置 Anthropic Claude Code CLI 环境变量的跨平台工具。

            ---

            ${{ steps.changelog.outputs.content }}

            ---

            ### 📥 下载

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | x64 | `dmxapi-claude-code-${{ github.ref_name }}-windows-amd64.exe` |
            | Linux | x64 | `dmxapi-claude-code-${{ github.ref_name }}-linux-amd64` |
            | Linux | ARM64 | `dmxapi-claude-code-${{ github.ref_name }}-linux-arm64` |
            | macOS | Intel | `dmxapi-claude-code-${{ github.ref_name }}-macos-amd64` |
            | macOS | Apple Silicon (M1/M2/M3/M4) | `dmxapi-claude-code-${{ github.ref_name }}-macos-arm64` |

            ---

            ### ⚡ 快速安装（推荐）

            **Linux / macOS**
            ```bash
            curl -fsSL https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.sh | bash
            ```

            **Windows PowerShell**
            ```powershell
            iwr -useb https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.ps1 | iex
            ```

            **Windows CMD**
            ```cmd
            curl -fsSL https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.cmd -o %TEMP%\install.cmd && %TEMP%\install.cmd
            ```

            ---

            ### 🛠️ 安装说明

            #### Windows x64
            ```powershell
            # 下载后直接运行
            .\dmxapi-claude-code-${{ github.ref_name }}-windows-amd64.exe
            ```

            #### Linux x64 (amd64)
            ```bash
            chmod +x dmxapi-claude-code-${{ github.ref_name }}-linux-amd64
            ./dmxapi-claude-code-${{ github.ref_name }}-linux-amd64
            ```

            #### Linux ARM64（树莓派、Graviton 等）
            ```bash
            chmod +x dmxapi-claude-code-${{ github.ref_name }}-linux-arm64
            ./dmxapi-claude-code-${{ github.ref_name }}-linux-arm64
            ```

            #### macOS Apple Silicon (M1/M2/M3/M4, arm64)
            ```bash
            chmod +x dmxapi-claude-code-${{ github.ref_name }}-macos-arm64
            xattr -cr dmxapi-claude-code-${{ github.ref_name }}-macos-arm64
            ./dmxapi-claude-code-${{ github.ref_name }}-macos-arm64
            ```

            #### macOS Intel (amd64)
            ```bash
            chmod +x dmxapi-claude-code-${{ github.ref_name }}-macos-amd64
            xattr -cr dmxapi-claude-code-${{ github.ref_name }}-macos-amd64
            ./dmxapi-claude-code-${{ github.ref_name }}-macos-amd64
            ```

            > **macOS 说明**：`xattr -cr` 用于移除系统对网络下载文件添加的隔离标记，为 macOS 运行未签名可执行文件的必要步骤，请勿跳过。

            ---

            ### 📋 配置的环境变量

            | 环境变量 | 说明 |
            |----------|------|
            | `ANTHROPIC_BASE_URL` | API 服务器地址 |
            | `ANTHROPIC_AUTH_TOKEN` | API 认证令牌 |
            | `ANTHROPIC_MODEL` | 默认模型 |
            | `ANTHROPIC_DEFAULT_HAIKU_MODEL` | Haiku 小型快速模型 |
            | `ANTHROPIC_DEFAULT_SONNET_MODEL` | Sonnet 标准模型 |
            | `ANTHROPIC_DEFAULT_OPUS_MODEL` | Opus 高级模型 |
            | `CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS` | 禁用实验性 Beta 功能（固定为 1）|

            ---

            ### 🔗 相关链接

            - [获取 API Token](https://www.dmxapi.cn/token)
            - [使用文档](https://www.dmxapi.cn/claudecode)
            
          files: |
            dmxapi-claude-code-${{ github.ref_name }}-windows-amd64.exe
            dmxapi-claude-code-${{ github.ref_name }}-linux-amd64
            dmxapi-claude-code-${{ github.ref_name }}-linux-arm64
            dmxapi-claude-code-${{ github.ref_name }}-macos-amd64
            dmxapi-claude-code-${{ github.ref_name }}-macos-arm64
