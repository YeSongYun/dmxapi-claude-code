# ============================================
# CNB 云原生构建配置
# ============================================

# 主分支推送 - 同步到 GitHub
main:
  push:
    - name: "自动同步到GitHub"
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      stages:
        - name: sync to github with rebase
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/YeSongYun/dmxapi-claude-code.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            sync_mode: rebase
  pull_request:
    - name: "AI 代码评审"
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      stages:
        - name: code-review
          image: cnbcool/code-review:latest
          settings:
            context: 50
            verbose: true
            comment: true
            max_comments: 50
            max_files: 150
            max_diff_size: 200000
            fail_on_critical: true

# Tag 推送 - 自动发布 Release
$:
  tag_push:
    - imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      stages:
        # 0. 先同步 Tag 到 GitHub
        - name: sync tag to github
          image: alpine/git
          script:
            - git remote add github https://${GIT_USERNAME}:${GIT_ACCESS_TOKEN}@github.com/YeSongYun/dmxapi-claude-code.git || true
            - git push github ${CNB_BRANCH} --force
        # 1. 生成更新日志（使用 git-cliff 支持 commit 自动分类）
        - name: 生成更新日志
          image: cnbcool/default-build-env
          script:
            - curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
            - git fetch --tags origin
            - ./git-cliff-2.7.0/git-cliff --config cliff.toml --latest --strip header
          exports:
            stdout: RELEASE_NOTES

        # 2. AI 润色更新日志（调用 Anthropic API）
        - name: AI 润色更新日志
          image: cnbcool/default-build-env
          script:
            - |
              # 将 prompt 模板写入临时文件（避免 shell 特殊字符问题）
              cat > /tmp/ai_prompt.txt << 'PROMPT_EOF'
              你是一个软件更新日志编辑器。请将以下 git 变更日志改写为面向普通用户的中文更新说明。

              要求：
              1. 保留版本号和日期
              2. 用通俗易懂的语言描述每个变更，去掉技术术语
              3. 保留 emoji 分类图标
              4. 每条说明控制在一行以内
              5. 输出必须以 "## " 开头（Markdown 二级标题）
              6. 只输出改写后的更新日志，不要输出其他内容

              原始变更日志：
              PROMPT_EOF
              printf '%s' "${RELEASE_NOTES}" >> /tmp/ai_prompt.txt
              PROMPT=$(cat /tmp/ai_prompt.txt)

              # 按模型前缀选择不同厂商接口
              call_ai() {
                case "${AI_MODEL}" in
                  claude*)
                    curl -s -w "\n%{http_code}" "${AI_API_URL}/v1/messages" \
                      -H "Content-Type: application/json" \
                      -H "x-api-key: ${AI_API_KEY}" \
                      -H "anthropic-version: 2023-06-01" \
                      -d "$(jq -n \
                        --arg model "${AI_MODEL}" \
                        --arg prompt "${PROMPT}" \
                        '{model: $model, max_tokens: 4096, messages: [{role: "user", content: $prompt}]}')"
                    ;;
                  gemini*)
                    curl -s -w "\n%{http_code}" "${AI_API_URL}/v1beta/models/${AI_MODEL}:generateContent?key=${AI_API_KEY}" \
                      -H "Content-Type: application/json" \
                      -d "$(jq -n \
                        --arg prompt "${PROMPT}" \
                        '{contents: [{parts: [{text: $prompt}]}], generationConfig: {maxOutputTokens: 4096}}')"
                    ;;
                  gpt-5*)
                    curl -s -w "\n%{http_code}" "${AI_API_URL}/v1/responses" \
                      -H "Content-Type: application/json" \
                      -H "Authorization: Bearer ${AI_API_KEY}" \
                      -d "$(jq -n \
                        --arg model "${AI_MODEL}" \
                        --arg prompt "${PROMPT}" \
                        '{model: $model, input: $prompt, max_output_tokens: 4096}')"
                    ;;
                  *)
                    curl -s -w "\n%{http_code}" "${AI_API_URL}/v1/completions" \
                      -H "Content-Type: application/json" \
                      -H "Authorization: Bearer ${AI_API_KEY}" \
                      -d "$(jq -n \
                        --arg model "${AI_MODEL}" \
                        --arg prompt "${PROMPT}" \
                        '{model: $model, prompt: $prompt, max_tokens: 4096}')"
                    ;;
                esac
              }

              extract_ai_text() {
                case "${AI_MODEL}" in
                  claude*)
                    echo "$1" | jq -r '.content[0].text // empty'
                    ;;
                  gemini*)
                    echo "$1" | jq -r '.candidates[0].content.parts[0].text // empty'
                    ;;
                  gpt-5*)
                    echo "$1" | jq -r '[.output[]?.content[]? | select(.type == "output_text") | .text] | join("\n")'
                    ;;
                  *)
                    echo "$1" | jq -r '.choices[0].text // empty'
                    ;;
                esac
              }

              RESPONSE=$(call_ai)
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              # 重试逻辑
              if [ "$HTTP_CODE" != "200" ]; then
                echo "AI API 首次调用失败 (HTTP $HTTP_CODE)，3 秒后重试..." >&2
                sleep 3
                RESPONSE=$(call_ai)
                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | sed '$d')
              fi

              # 提取 AI 输出
              if [ "$HTTP_CODE" = "200" ]; then
                AI_TEXT=$(extract_ai_text "$BODY")
                AI_LEN=${#AI_TEXT}
                # 验证输出格式
                if echo "$AI_TEXT" | head -1 | grep -q '^## ' && [ "$AI_LEN" -le 10000 ]; then
                  echo "$AI_TEXT"
                  exit 0
                fi
                echo "AI 输出格式验证失败（长度=${AI_LEN}），使用原始日志" >&2
              else
                echo "AI API 调用失败 (HTTP $HTTP_CODE)，使用原始日志" >&2
              fi

              # 回退：输出原始 RELEASE_NOTES
              echo "${RELEASE_NOTES}"
          exports:
            stdout: AI_RELEASE_NOTES

        # 3. 更新 CHANGELOG.md 并推送回 main
        - name: 更新 CHANGELOG.md
          image: cnbcool/default-build-env
          script:
            - |
              # 检查 AI_RELEASE_NOTES 是否为空
              if [ -z "${AI_RELEASE_NOTES}" ]; then
                echo "AI_RELEASE_NOTES 为空，跳过 CHANGELOG 更新" >&2
                exit 0
              fi

              git config user.name "CNB Bot"
              git config user.email "bot@cnb.cool"

              # 基于 origin/main 创建临时分支（避免 detached HEAD 问题）
              git fetch origin main
              git checkout -b temp-changelog origin/main

              # 找到第一个 "## " 标题的行号
              FIRST_HEADING=$(grep -n '^## ' CHANGELOG.md | head -1 | cut -d: -f1)

              if [ -n "$FIRST_HEADING" ]; then
                # 拆分文件：头部（标题+描述）和正文（各版本内容）
                head -n $((FIRST_HEADING - 1)) CHANGELOG.md > /tmp/changelog_header.md
                tail -n +${FIRST_HEADING} CHANGELOG.md > /tmp/changelog_body.md

                # 拼接：头部 + 新内容 + 空行 + 原正文（与 spec 一致）
                cat /tmp/changelog_header.md > CHANGELOG.md
                echo "" >> CHANGELOG.md
                echo "${AI_RELEASE_NOTES}" >> CHANGELOG.md
                echo "" >> CHANGELOG.md
                cat /tmp/changelog_body.md >> CHANGELOG.md
              else
                # 没有 ## 行，追加到末尾
                echo "" >> CHANGELOG.md
                echo "${AI_RELEASE_NOTES}" >> CHANGELOG.md
              fi

              # 提交并推送临时分支到 main
              git add CHANGELOG.md
              git commit -m "docs: update CHANGELOG.md for ${CNB_BRANCH}"
              git remote set-url origin https://${GIT_USERNAME}:${GIT_ACCESS_TOKEN}@cnb.cool/dmxapi/dmxapi_claude_code.git
              if ! git push origin temp-changelog:main; then
                echo "推送 CHANGELOG.md 到 main 失败（可能存在并发冲突），跳过本次更新" >&2
                exit 0
              fi

        # 4. 编译各平台二进制文件
        - name: 编译 Windows AMD64
          image: golang:1.21
          script:
            - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${CNB_BRANCH}-windows-amd64.exe

        - name: 编译 Linux AMD64
          image: golang:1.21
          script:
            - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${CNB_BRANCH}-linux-amd64

        - name: 编译 Linux ARM64
          image: golang:1.21
          script:
            - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dmxapi-claude-code-${CNB_BRANCH}-linux-arm64

        - name: 编译 macOS AMD64
          image: golang:1.21
          script:
            - CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dmxapi-claude-code-${CNB_BRANCH}-macos-amd64

        - name: 编译 macOS ARM64
          image: golang:1.21
          script:
            - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dmxapi-claude-code-${CNB_BRANCH}-macos-arm64

        # 5. 先创建 Release（必须在上传附件之前）
        - name: 创建 Release
          type: git:release
          options:
            title: DMXAPI Claude Code ${CNB_BRANCH}
            description: |
              ## DMXAPI Claude Code 配置工具 ${CNB_BRANCH}

              一键配置 Anthropic Claude Code CLI 环境变量的跨平台工具。

              ---

              ${AI_RELEASE_NOTES}

              ---

              ### 📥 下载

              | 平台 | 架构 | 文件 |
              |------|------|------|
              | Windows | x64 | `dmxapi-claude-code-${CNB_BRANCH}-windows-amd64.exe` |
              | Linux | x64 | `dmxapi-claude-code-${CNB_BRANCH}-linux-amd64` |
              | Linux | ARM64 | `dmxapi-claude-code-${CNB_BRANCH}-linux-arm64` |
              | macOS | Intel | `dmxapi-claude-code-${CNB_BRANCH}-macos-amd64` |
              | macOS | Apple Silicon (M1/M2/M3/M4) | `dmxapi-claude-code-${CNB_BRANCH}-macos-arm64` |

              ---

              ### ⚡ 快速安装（推荐）

              **Linux / macOS**
              ```bash
              curl -fsSL https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.sh | bash
              ```

              **Windows PowerShell**
              ```powershell
              iwr -useb https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.ps1 | iex
              ```

              **Windows CMD**
              ```cmd
              curl -fsSL https://cnb.cool/dmxapi/dmxapi_claude_code/-/git/raw/main/install.cmd -o %TEMP%\install.cmd && %TEMP%\install.cmd
              ```

              ---

              ### 🛠️ 安装说明

              #### Windows x64
              ```powershell
              # 下载后直接运行
              .\dmxapi-claude-code-${CNB_BRANCH}-windows-amd64.exe
              ```

              #### Linux x64 (amd64)
              ```bash
              chmod +x dmxapi-claude-code-${CNB_BRANCH}-linux-amd64
              ./dmxapi-claude-code-${CNB_BRANCH}-linux-amd64
              ```

              #### Linux ARM64（树莓派、Graviton 等）
              ```bash
              chmod +x dmxapi-claude-code-${CNB_BRANCH}-linux-arm64
              ./dmxapi-claude-code-${CNB_BRANCH}-linux-arm64
              ```

              #### macOS Apple Silicon (M1/M2/M3/M4, arm64)
              ```bash
              chmod +x dmxapi-claude-code-${CNB_BRANCH}-macos-arm64
              xattr -cr dmxapi-claude-code-${CNB_BRANCH}-macos-arm64
              ./dmxapi-claude-code-${CNB_BRANCH}-macos-arm64
              ```

              #### macOS Intel (amd64)
              ```bash
              chmod +x dmxapi-claude-code-${CNB_BRANCH}-macos-amd64
              xattr -cr dmxapi-claude-code-${CNB_BRANCH}-macos-amd64
              ./dmxapi-claude-code-${CNB_BRANCH}-macos-amd64
              ```

              > **macOS 说明**：`xattr -cr` 用于移除系统对网络下载文件添加的隔离标记，为 macOS 运行未签名可执行文件的必要步骤，请勿跳过。

              ---

              ### 📋 配置的环境变量

              | 环境变量 | 说明 |
              |----------|------|
              | `ANTHROPIC_BASE_URL` | API 服务器地址 |
              | `ANTHROPIC_AUTH_TOKEN` | API 认证令牌 |
              | `ANTHROPIC_MODEL` | 默认模型 |
              | `ANTHROPIC_DEFAULT_HAIKU_MODEL` | Haiku 小型快速模型 |
              | `ANTHROPIC_DEFAULT_SONNET_MODEL` | Sonnet 标准模型 |
              | `ANTHROPIC_DEFAULT_OPUS_MODEL` | Opus 高级模型 |
              | `CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS` | 禁用实验性 Beta 功能（固定为 1）|

              ---

              ### 🔗 相关链接

              - [获取 API Token](https://www.dmxapi.cn/token)
              - [使用文档](https://www.dmxapi.cn/claudecode)

        # 6. 再上传附件到已创建的 Release
        - name: 上传 Release 附件
          image: cnbcool/attachments
          settings:
            attachments:
              - "./dmxapi-claude-code-${CNB_BRANCH}-*"
            ttl: 0
        # 7. 清理旧版本，只保留最近3个
        - name: 清理旧版本
          image: docker.cnb.cool/cnb/plugins/cnbcool/release-clean:latest
          settings:
            filter: "RECENT_N=3"
            debug: false